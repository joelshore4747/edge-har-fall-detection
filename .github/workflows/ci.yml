name: CI

on:
  push:
    branches: [master, staging]
  pull_request:
    branches: [master, staging]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime + dev requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Type-check core libs
        run: mypy pipeline models scripts/lib services/runtime_model_loader.py
        # ``--ignore-missing-imports`` is configured in mypy.ini if present;
        # the CI run only covers the modules we've actively typed so the
        # PR check stays green while older code is gradually annotated.
        continue-on-error: true

      - name: Run unit + non-DB integration tests
        run: pytest tests/ -q --ignore=tests/test_runtime_infer_session_end_to_end.py

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: summit
          POSTGRES_PASSWORD: summit
          POSTGRES_DB: summit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U summit -d summit"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime + dev requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Enable pgcrypto in the test database
        env:
          PGPASSWORD: summit
        run: |
          psql -h 127.0.0.1 -p 5432 -U summit -d summit \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Verify required E2E artefacts are present
        run: |
          set -e
          for path in \
            apps/mobile/app_mobile/assets/demo_session_phone1.json \
            artifacts/har/har_rf_ucihar.joblib \
            artifacts/fall/fall_meta_phone_negatives_v1/model.joblib; do
            if [ ! -f "$path" ]; then
              echo "::warning ::missing E2E asset $path — the integration test will skip"
            fi
          done

      - name: Run end-to-end integration test (live API → model → DB → admin)
        env:
          SCHEMA_TEST_DATABASE_URL: postgresql://summit:summit@127.0.0.1:5432/summit
        run: pytest tests/test_runtime_infer_session_end_to_end.py -q -v
